<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="designGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="designGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.6" />
    </linearGradient>
    <style>
      .fractal-square {
        transform-origin: 45px 45px;
      }
      
      .primary-rotate {
        animation: primaryRotate 35s linear infinite;
      }
      
      .secondary-rotate {
        animation: secondaryRotate 28s linear infinite reverse;
      }
      
      .tertiary-rotate {
        animation: tertiaryRotate 42s linear infinite;
      }
      
      .quaternary-rotate {
        animation: quaternaryRotate 50s linear infinite reverse;
      }
      
      .quinary-rotate {
        animation: quinaryRotate 60s linear infinite;
      }
      
      .senary-rotate {
        animation: senaryRotate 70s linear infinite reverse;
      }
      
      .septenary-rotate {
        animation: septenaryRotate 80s linear infinite;
      }
      
      .octonary-rotate {
        animation: octonaryRotate 90s linear infinite reverse;
      }
      
      .nonary-rotate {
        animation: nonaryRotate 75s linear infinite;
      }
      
      .denary-rotate {
        animation: denaryRotate 85s linear infinite reverse;
      }
      
      .floating {
        animation: float 12s ease-in-out infinite;
      }
      
      .floating:nth-child(2) {
        animation-delay: 3s;
      }
      
      .floating:nth-child(3) {
        animation-delay: 6s;
      }
      
      .pulse {
        animation: pulse 10s ease-in-out infinite;
      }
      
      .pulse:nth-child(2) {
        animation-delay: 2.5s;
      }
      
      .pulse:nth-child(3) {
        animation-delay: 5s;
      }
      
      .breathing {
        animation: breathing 15s ease-in-out infinite;
      }
      
      .glow {
        animation: glow 8s ease-in-out infinite;
      }
      
      @keyframes primaryRotate {
        0% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.1);
        }
        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      
      @keyframes secondaryRotate {
        0% {
          transform: rotate(0deg) scale(1.1);
        }
        50% {
          transform: rotate(-180deg) scale(0.9);
        }
        100% {
          transform: rotate(-360deg) scale(1.1);
        }
      }
      
      @keyframes tertiaryRotate {
        0% {
          transform: rotate(0deg) scale(0.9);
        }
        50% {
          transform: rotate(180deg) scale(1.2);
        }
        100% {
          transform: rotate(360deg) scale(0.9);
        }
      }
      
      @keyframes quaternaryRotate {
        0% {
          transform: rotate(0deg) scale(1.2);
        }
        50% {
          transform: rotate(-180deg) scale(0.8);
        }
        100% {
          transform: rotate(-360deg) scale(1.2);
        }
      }
      
      @keyframes quinaryRotate {
        0% {
          transform: rotate(0deg) scale(0.8);
        }
        50% {
          transform: rotate(180deg) scale(1.3);
        }
        100% {
          transform: rotate(360deg) scale(0.8);
        }
      }
      
      @keyframes senaryRotate {
        0% {
          transform: rotate(0deg) scale(1.3);
        }
        50% {
          transform: rotate(-180deg) scale(0.7);
        }
        100% {
          transform: rotate(-360deg) scale(1.3);
        }
      }
      
      @keyframes septenaryRotate {
        0% {
          transform: rotate(0deg) scale(0.6);
        }
        50% {
          transform: rotate(180deg) scale(1.4);
        }
        100% {
          transform: rotate(360deg) scale(0.6);
        }
      }
      
      @keyframes octonaryRotate {
        0% {
          transform: rotate(0deg) scale(1.4);
        }
        50% {
          transform: rotate(-180deg) scale(0.5);
        }
        100% {
          transform: rotate(-360deg) scale(1.4);
        }
      }
      
      @keyframes nonaryRotate {
        0% {
          transform: rotate(0deg) scale(0.5);
        }
        50% {
          transform: rotate(180deg) scale(1.5);
        }
        100% {
          transform: rotate(360deg) scale(0.5);
        }
      }
      
      @keyframes denaryRotate {
        0% {
          transform: rotate(0deg) scale(1.5);
        }
        50% {
          transform: rotate(-180deg) scale(0.4);
        }
        100% {
          transform: rotate(-360deg) scale(1.5);
        }
      }
      
      @keyframes float {
        0%, 100% {
          transform: translateY(0px);
          opacity: 0.4;
        }
        50% {
          transform: translateY(-6px);
          opacity: 0.8;
        }
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.3;
        }
        50% {
          transform: scale(1.1);
          opacity: 0.7;
        }
      }
      
      @keyframes breathing {
        0%, 100% {
          transform: scale(1);
          opacity: 0.2;
        }
        50% {
          transform: scale(1.2);
          opacity: 0.6;
        }
      }
      
      @keyframes glow {
        0%, 100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.8;
        }
      }
    </style>
  </defs>
  
  <!-- Central Core Circle -->
  <circle cx="45" cy="45" r="3" fill="url(#designGradient1)" opacity="0.6" class="fractal-square primary-rotate"/>
  
  <!-- First Layer of Rotating Circles -->
  <g class="fractal-square secondary-rotate">
    <circle cx="30.5" cy="30.5" r="2.5" fill="#0d9488" opacity="0.5" class="floating"/>
    <circle cx="59.5" cy="30.5" r="2.5" fill="#f97316" opacity="0.5" class="floating"/>
    <circle cx="59.5" cy="59.5" r="2.5" fill="#0d9488" opacity="0.5" class="floating"/>
    <circle cx="30.5" cy="59.5" r="2.5" fill="#f97316" opacity="0.5" class="floating"/>
  </g>
  
  <!-- Second Layer of Rotating Circles -->
  <g class="fractal-square tertiary-rotate">
    <circle cx="20" cy="20" r="2" fill="#f97316" opacity="0.4" class="pulse"/>
    <circle cx="70" cy="20" r="2" fill="#0d9488" opacity="0.4" class="pulse"/>
    <circle cx="70" cy="70" r="2" fill="#f97316" opacity="0.4" class="pulse"/>
    <circle cx="20" cy="70" r="2" fill="#0d9488" opacity="0.4" class="pulse"/>
  </g>
  
  <!-- Third Layer of Rotating Circles -->
  <g class="fractal-square quaternary-rotate">
    <circle cx="13.5" cy="13.5" r="1.5" fill="#0d9488" opacity="0.3" class="floating"/>
    <circle cx="76.5" cy="13.5" r="1.5" fill="#f97316" opacity="0.3" class="floating"/>
    <circle cx="76.5" cy="76.5" r="1.5" fill="#0d9488" opacity="0.3" class="floating"/>
    <circle cx="13.5" cy="76.5" r="1.5" fill="#f97316" opacity="0.3" class="floating"/>
  </g>
  
  <!-- Fourth Layer of Rotating Circles -->
  <g class="fractal-square quinary-rotate">
    <circle cx="8" cy="8" r="1" fill="#f97316" opacity="0.25" class="pulse"/>
    <circle cx="82" cy="8" r="1" fill="#0d9488" opacity="0.25" class="pulse"/>
    <circle cx="82" cy="82" r="1" fill="#f97316" opacity="0.25" class="pulse"/>
    <circle cx="8" cy="82" r="1" fill="#0d9488" opacity="0.25" class="pulse"/>
  </g>
  
  <!-- Fifth Layer of Rotating Circles -->
  <g class="fractal-square senary-rotate">
    <circle cx="3.5" cy="3.5" r="0.5" fill="#0d9488" opacity="0.2" class="breathing"/>
    <circle cx="86.5" cy="3.5" r="0.5" fill="#f97316" opacity="0.2" class="breathing"/>
    <circle cx="86.5" cy="86.5" r="0.5" fill="#0d9488" opacity="0.2" class="breathing"/>
    <circle cx="3.5" cy="86.5" r="0.5" fill="#f97316" opacity="0.2" class="breathing"/>
  </g>
  
  <!-- Sixth Layer of Rotating Circles -->
  <g class="fractal-square septenary-rotate">
    <circle cx="1.5" cy="1.5" r="0.5" fill="#f97316" opacity="0.15" class="floating"/>
    <circle cx="88.5" cy="1.5" r="0.5" fill="#0d9488" opacity="0.15" class="floating"/>
    <circle cx="88.5" cy="88.5" r="0.5" fill="#f97316" opacity="0.15" class="floating"/>
    <circle cx="1.5" cy="88.5" r="0.5" fill="#0d9488" opacity="0.15" class="floating"/>
  </g>
  
  <!-- Seventh Layer of Rotating Circles -->
  <g class="fractal-square octonary-rotate">
    <circle cx="0.75" cy="0.75" r="0.25" fill="#0d9488" opacity="0.12" class="pulse"/>
    <circle cx="89.25" cy="0.75" r="0.25" fill="#f97316" opacity="0.12" class="pulse"/>
    <circle cx="89.25" cy="89.25" r="0.25" fill="#0d9488" opacity="0.12" class="pulse"/>
    <circle cx="0.75" cy="89.25" r="0.25" fill="#f97316" opacity="0.12" class="pulse"/>
  </g>
  
  <!-- Eighth Layer of Rotating Circles -->
  <g class="fractal-square nonary-rotate">
    <circle cx="0.375" cy="0.375" r="0.125" fill="#f97316" opacity="0.1" class="breathing"/>
    <circle cx="89.625" cy="0.375" r="0.125" fill="#0d9488" opacity="0.1" class="breathing"/>
    <circle cx="89.625" cy="89.625" r="0.125" fill="#f97316" opacity="0.1" class="breathing"/>
    <circle cx="0.375" cy="89.625" r="0.125" fill="#0d9488" opacity="0.1" class="breathing"/>
  </g>
  
  <!-- Ninth Layer of Rotating Circles -->
  <g class="fractal-square denary-rotate">
    <circle cx="0.1875" cy="0.1875" r="0.0625" fill="#0d9488" opacity="0.08" class="floating"/>
    <circle cx="89.8125" cy="0.1875" r="0.0625" fill="#f97316" opacity="0.08" class="floating"/>
    <circle cx="89.8125" cy="89.8125" r="0.0625" fill="#0d9488" opacity="0.08" class="floating"/>
    <circle cx="0.1875" cy="89.8125" r="0.0625" fill="#f97316" opacity="0.08" class="floating"/>
  </g>
  
  <!-- Tenth Layer of Rotating Circles -->
  <g class="fractal-square primary-rotate">
    <circle cx="0.09375" cy="0.09375" r="0.03125" fill="#f97316" opacity="0.06" class="pulse"/>
    <circle cx="89.90625" cy="0.09375" r="0.03125" fill="#0d9488" opacity="0.06" class="pulse"/>
    <circle cx="89.90625" cy="89.90625" r="0.03125" fill="#f97316" opacity="0.06" class="pulse"/>
    <circle cx="0.09375" cy="89.90625" r="0.03125" fill="#0d9488" opacity="0.06" class="pulse"/>
  </g>
  
  <!-- Additional Circles - Eleventh Layer -->
  <g class="fractal-square secondary-rotate">
    <circle cx="0.046875" cy="0.046875" r="0.015625" fill="url(#designGradient1)" opacity="0.05" class="glow"/>
    <circle cx="89.953125" cy="0.046875" r="0.015625" fill="url(#designGradient2)" opacity="0.05" class="glow"/>
    <circle cx="89.953125" cy="89.953125" r="0.015625" fill="url(#designGradient1)" opacity="0.05" class="glow"/>
    <circle cx="0.046875" cy="89.953125" r="0.015625" fill="url(#designGradient2)" opacity="0.05" class="glow"/>
  </g>
  
  <!-- Additional Circles - Twelfth Layer -->
  <g class="fractal-square tertiary-rotate">
    <circle cx="0.0234375" cy="0.0234375" r="0.0078125" fill="#f97316" opacity="0.04" class="breathing"/>
    <circle cx="89.9765625" cy="0.0234375" r="0.0078125" fill="#0d9488" opacity="0.04" class="breathing"/>
    <circle cx="89.9765625" cy="89.9765625" r="0.0078125" fill="#f97316" opacity="0.04" class="breathing"/>
    <circle cx="0.0234375" cy="89.9765625" r="0.0078125" fill="#0d9488" opacity="0.04" class="breathing"/>
  </g>
  
  <!-- Connection Lines Between Layers -->
  <line x1="45" y1="45" x2="29" y2="29" stroke="url(#designGradient1)" stroke-width="0.5" opacity="0.2"/>
  <line x1="45" y1="45" x2="61" y2="29" stroke="url(#designGradient2)" stroke-width="0.5" opacity="0.2"/>
  <line x1="45" y1="45" x2="61" y2="61" stroke="url(#designGradient1)" stroke-width="0.5" opacity="0.2"/>
  <line x1="45" y1="45" x2="29" y2="61" stroke="url(#designGradient2)" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Additional Connection Lines for 4D Effect -->
  <line x1="45" y1="45" x2="17" y2="17" stroke="#f97316" stroke-width="0.3" opacity="0.15"/>
  <line x1="45" y1="45" x2="73" y2="17" stroke="#0d9488" stroke-width="0.3" opacity="0.15"/>
  <line x1="45" y1="45" x2="73" y2="73" stroke="#f97316" stroke-width="0.3" opacity="0.15"/>
  <line x1="45" y1="45" x2="17" y2="73" stroke="#0d9488" stroke-width="0.3" opacity="0.15"/>
  
  <!-- Additional Connection Lines -->
  <line x1="45" y1="45" x2="10" y2="10" stroke="#0d9488" stroke-width="0.2" opacity="0.1"/>
  <line x1="45" y1="45" x2="80" y2="10" stroke="#f97316" stroke-width="0.2" opacity="0.1"/>
  <line x1="45" y1="45" x2="80" y2="80" stroke="#0d9488" stroke-width="0.2" opacity="0.1"/>
  <line x1="45" y1="45" x2="10" y2="80" stroke="#f97316" stroke-width="0.2" opacity="0.1"/>
  
  <!-- Glowing Center Point -->
  <circle cx="45" cy="45" r="2" fill="url(#designGradient1)" opacity="0.7" class="pulse"/>
  <circle cx="45" cy="45" r="4" fill="url(#designGradient2)" opacity="0.2" class="pulse"/>
  <circle cx="45" cy="45" r="6" fill="url(#designGradient1)" opacity="0.1" class="breathing"/>
  
  <!-- Additional Glow Rings -->
  <circle cx="45" cy="45" r="8" fill="url(#designGradient2)" opacity="0.08" class="glow"/>
  <circle cx="45" cy="45" r="10" fill="url(#designGradient1)" opacity="0.05" class="breathing"/>
</svg> 