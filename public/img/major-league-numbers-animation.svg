<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mlnBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="mlnRed" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="mlnBlue" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="mlnWhite" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </radialGradient>
    <filter id="mlnShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Diamond shape (baseball diamond) faint outline -->
  <polygon points="100,30 170,100 100,170 30,100" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4" opacity="0.4" class="mlnDiamondPulse"/>

  <!-- Center baseball -->
  <circle cx="100" cy="100" r="14" fill="url(#mlnBall)" filter="url(#mlnShadow)" class="mlnCenterPulse"/>
  <!-- Baseball seam lines -->
  <path d="M 93 87 Q 88 95 93 103" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" opacity="0.7" class="mlnCenterPulse"/>
  <path d="M 107 87 Q 112 95 107 103" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" opacity="0.7" class="mlnCenterPulse"/>

  <!-- Orbit ring 1 - outer -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#dc2626" stroke-width="0.5" opacity="0.15" stroke-dasharray="2,6"/>
  <!-- Orbit ring 2 - inner -->
  <circle cx="100" cy="100" r="35" fill="none" stroke="#2563eb" stroke-width="0.5" opacity="0.15" stroke-dasharray="2,6"/>

  <!-- Outer orbit: Red and blue spheres -->
  <g class="mlnOrbit1">
    <circle cx="100" cy="45" r="7" fill="url(#mlnRed)" filter="url(#mlnShadow)" opacity="0.9" class="mlnOuter1"/>
    <circle cx="155" cy="100" r="5" fill="url(#mlnBlue)" filter="url(#mlnShadow)" opacity="0.85" class="mlnOuter2"/>
    <circle cx="100" cy="155" r="7" fill="url(#mlnRed)" filter="url(#mlnShadow)" opacity="0.9" class="mlnOuter3"/>
    <circle cx="45" cy="100" r="5" fill="url(#mlnBlue)" filter="url(#mlnShadow)" opacity="0.85" class="mlnOuter4"/>
  </g>

  <!-- Inner orbit: White and blue spheres -->
  <g class="mlnOrbit2">
    <circle cx="125" cy="75" r="4" fill="url(#mlnWhite)" filter="url(#mlnShadow)" opacity="0.8" class="mlnInner1"/>
    <circle cx="125" cy="125" r="5" fill="url(#mlnBlue)" filter="url(#mlnShadow)" opacity="0.75" class="mlnInner2"/>
    <circle cx="75" cy="125" r="4" fill="url(#mlnWhite)" filter="url(#mlnShadow)" opacity="0.8" class="mlnInner3"/>
    <circle cx="75" cy="75" r="5" fill="url(#mlnRed)" filter="url(#mlnShadow)" opacity="0.75" class="mlnInner4"/>
  </g>

  <!-- Faint stat lines radiating out -->
  <line x1="100" y1="86" x2="100" y2="45" stroke="#dc2626" stroke-width="0.5" opacity="0.12" class="mlnStatLine1"/>
  <line x1="114" y1="100" x2="155" y2="100" stroke="#2563eb" stroke-width="0.5" opacity="0.12" class="mlnStatLine2"/>
  <line x1="100" y1="114" x2="100" y2="155" stroke="#dc2626" stroke-width="0.5" opacity="0.12" class="mlnStatLine3"/>
  <line x1="86" y1="100" x2="45" y2="100" stroke="#2563eb" stroke-width="0.5" opacity="0.12" class="mlnStatLine4"/>

  <style>
    .mlnCenterPulse {
      transform-origin: 100px 100px;
      animation: mlnPulse 8s ease-in-out infinite;
    }
    .mlnDiamondPulse {
      transform-origin: 100px 100px;
      animation: mlnDiamondBreath 10s ease-in-out infinite;
    }

    /* Outer orbit paths (circular) */
    .mlnOuter1 { animation: mlnCircleOuter 50s linear infinite; transform-origin: 100px 100px; }
    .mlnOuter2 { animation: mlnCircleOuter 50s linear infinite; transform-origin: 100px 100px; animation-delay: -12.5s; }
    .mlnOuter3 { animation: mlnCircleOuter 50s linear infinite; transform-origin: 100px 100px; animation-delay: -25s; }
    .mlnOuter4 { animation: mlnCircleOuter 50s linear infinite; transform-origin: 100px 100px; animation-delay: -37.5s; }

    /* Inner orbit paths (counter-rotate) */
    .mlnInner1 { animation: mlnCircleInner 40s linear infinite; transform-origin: 100px 100px; }
    .mlnInner2 { animation: mlnCircleInner 40s linear infinite; transform-origin: 100px 100px; animation-delay: -10s; }
    .mlnInner3 { animation: mlnCircleInner 40s linear infinite; transform-origin: 100px 100px; animation-delay: -20s; }
    .mlnInner4 { animation: mlnCircleInner 40s linear infinite; transform-origin: 100px 100px; animation-delay: -30s; }

    /* Stat line pulse */
    .mlnStatLine1 { animation: mlnLinePulse 6s ease-in-out infinite; }
    .mlnStatLine2 { animation: mlnLinePulse 6s ease-in-out infinite; animation-delay: -1.5s; }
    .mlnStatLine3 { animation: mlnLinePulse 6s ease-in-out infinite; animation-delay: -3s; }
    .mlnStatLine4 { animation: mlnLinePulse 6s ease-in-out infinite; animation-delay: -4.5s; }

    @keyframes mlnCircleOuter {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes mlnCircleInner {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    @keyframes mlnPulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes mlnDiamondBreath {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.04); }
    }
    @keyframes mlnLinePulse {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.25; }
    }
  </style>
</svg>
