<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="12" fill="#F6F6F6"/>
  
  <!-- Canvas area -->
  <rect x="20" y="20" width="160" height="160" rx="8" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  
  <!-- Wireframe elements -->
  <!-- Header -->
  <rect x="30" y="30" width="140" height="20" rx="2" fill="#E5E5E5"/>
  <rect x="35" y="35" width="60" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="100" y="35" width="20" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="125" y="35" width="20" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="150" y="35" width="15" height="10" rx="2" fill="#CCCCCC"/>
  
  <!-- Navigation -->
  <rect x="30" y="60" width="140" height="15" rx="2" fill="#F0F0F0"/>
  <rect x="35" y="65" width="20" height="5" rx="1" fill="#CCCCCC"/>
  <rect x="60" y="65" width="20" height="5" rx="1" fill="#CCCCCC"/>
  <rect x="85" y="65" width="20" height="5" rx="1" fill="#CCCCCC"/>
  <rect x="110" y="65" width="20" height="5" rx="1" fill="#CCCCCC"/>
  <rect x="135" y="65" width="30" height="5" rx="1" fill="#CCCCCC"/>
  
  <!-- Main content area -->
  <rect x="30" y="85" width="90" height="90" rx="2" fill="#F8F8F8"/>
  
  <!-- Content blocks -->
  <rect x="35" y="90" width="80" height="15" rx="2" fill="#E5E5E5"/>
  <rect x="35" y="110" width="80" height="15" rx="2" fill="#E5E5E5"/>
  <rect x="35" y="130" width="80" height="15" rx="2" fill="#E5E5E5"/>
  <rect x="35" y="150" width="80" height="15" rx="2" fill="#E5E5E5"/>
  
  <!-- Sidebar -->
  <rect x="130" y="85" width="40" height="90" rx="2" fill="#F0F0F0"/>
  <rect x="135" y="90" width="30" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="135" y="105" width="30" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="135" y="120" width="30" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="135" y="135" width="30" height="10" rx="2" fill="#CCCCCC"/>
  <rect x="135" y="150" width="30" height="10" rx="2" fill="#CCCCCC"/>
  
  <!-- Footer -->
  <rect x="30" y="185" width="140" height="10" rx="2" fill="#E5E5E5"/>
  
  <!-- Wireframe connection lines -->
  <path d="M 50 50 Q 70 50 70 70" stroke="#18A0FB" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
  <path d="M 70 70 Q 90 70 90 90" stroke="#18A0FB" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
  <path d="M 90 90 Q 110 90 110 110" stroke="#18A0FB" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
  
  <!-- Figma logo elements -->
  <!-- F shape in corner -->
  <path d="M 25 25 L 25 35 L 35 35 L 35 32 L 28 32 L 28 30 L 35 30 L 35 27 L 28 27 L 28 25 Z" fill="#18A0FB"/>
  
  <!-- Wireframe icon -->
  <rect x="25" y="45" width="20" height="15" rx="2" fill="#18A0FB" opacity="0.8"/>
  <rect x="27" y="47" width="16" height="3" rx="1" fill="white"/>
  <rect x="27" y="52" width="12" height="3" rx="1" fill="white"/>
  <rect x="27" y="57" width="14" height="3" rx="1" fill="white"/>
  
  <!-- Flow diagram elements -->
  <circle cx="160" cy="50" r="8" fill="#18A0FB" opacity="0.3"/>
  <circle cx="160" cy="50" r="4" fill="#18A0FB"/>
  <circle cx="160" cy="80" r="8" fill="#18A0FB" opacity="0.3"/>
  <circle cx="160" cy="80" r="4" fill="#18A0FB"/>
  <circle cx="160" cy="110" r="8" fill="#18A0FB" opacity="0.3"/>
  <circle cx="160" cy="110" r="4" fill="#18A0FB"/>
  
  <!-- Connection arrows -->
  <path d="M 160 58 L 160 72" stroke="#18A0FB" stroke-width="2" fill="none"/>
  <polygon points="157,70 160,75 163,70" fill="#18A0FB"/>
  <path d="M 160 88 L 160 102" stroke="#18A0FB" stroke-width="2" fill="none"/>
  <polygon points="157,100 160,105 163,100" fill="#18A0FB"/>
  
  <!-- Play button for wireframe prototype -->
  <circle cx="160" cy="150" r="12" fill="#18A0FB"/>
  <polygon points="155,145 155,155 165,150" fill="white"/>
</svg> 