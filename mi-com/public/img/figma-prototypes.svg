<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="12" fill="#F6F6F6"/>
  
  <!-- Figma-style interface elements -->
  <!-- Top toolbar -->
  <rect x="20" y="20" width="160" height="12" rx="6" fill="#18A0FB"/>
  
  <!-- Left sidebar -->
  <rect x="20" y="40" width="40" height="140" rx="6" fill="#E5E5E5"/>
  
  <!-- Canvas area -->
  <rect x="70" y="40" width="110" height="140" rx="6" fill="white" stroke="#E5E5E5" stroke-width="1"/>
  
  <!-- Prototype elements on canvas -->
  <!-- Frame -->
  <rect x="80" y="60" width="80" height="60" rx="4" fill="#18A0FB" opacity="0.1" stroke="#18A0FB" stroke-width="1"/>
  
  <!-- Button -->
  <rect x="90" y="80" width="60" height="24" rx="12" fill="#18A0FB"/>
  <text x="120" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Button</text>
  
  <!-- Text element -->
  <rect x="90" y="110" width="60" height="8" rx="4" fill="#E5E5E5"/>
  
  <!-- Connection line (prototype flow) -->
  <path d="M 160 90 Q 180 90 180 110" stroke="#18A0FB" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  
  <!-- Arrow head -->
  <polygon points="175,105 180,110 175,115" fill="#18A0FB"/>
  
  <!-- Figma logo elements -->
  <!-- F shape -->
  <path d="M 30 60 L 30 80 L 45 80 L 45 75 L 35 75 L 35 70 L 45 70 L 45 65 L 35 65 L 35 60 Z" fill="#18A0FB"/>
  
  <!-- Grid dots in sidebar -->
  <circle cx="30" cy="100" r="2" fill="#18A0FB"/>
  <circle cx="40" cy="100" r="2" fill="#18A0FB"/>
  <circle cx="30" cy="110" r="2" fill="#18A0FB"/>
  <circle cx="40" cy="110" r="2" fill="#18A0FB"/>
  <circle cx="30" cy="120" r="2" fill="#18A0FB"/>
  <circle cx="40" cy="120" r="2" fill="#18A0FB"/>
  
  <!-- Play button for prototype -->
  <circle cx="160" cy="130" r="12" fill="#18A0FB"/>
  <polygon points="155,125 155,135 165,130" fill="white"/>
</svg> 