  <rect x="78" y="85" width="44" height="16" rx="3" fill="#E5E5E5"/>
  <rect x="80" y="87" width="8" height="8" rx="2" fill="#18A0FB"/>
  <rect x="90" y="87" width="30" height="3" rx="1" fill="#666666"/>
  <rect x="90" y="92" width="20" height="2" rx="1" fill="#999999"/>
  
  <!-- Card 2 -->
  <rect x="78" y="105" width="44" height="16" rx="3" fill="#E5E5E5"/>
  <rect x="80" y="107" width="8" height="8" rx="2" fill="#18A0FB"/>
  <rect x="90" y="107" width="30" height="3" rx="1" fill="#666666"/>
  <rect x="90" y="112" width="20" height="2" rx="1" fill="#999999"/>
  
  <!-- Card 3 -->
  <rect x="78" y="125" width="44" height="16" rx="3" fill="#E5E5E5"/>
