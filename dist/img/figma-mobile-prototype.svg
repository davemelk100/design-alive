  <!-- Prototype connection lines -->
  <path d="M 140 80 Q 160 80 160 100" stroke="#18A0FB" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <polygon points="155,95 160,100 155,105" fill="#18A0FB"/>
  
