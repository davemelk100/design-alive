  <circle cx="95" cy="149" r="2" fill="#CCCCCC"/>
  <circle cx="105" cy="149" r="2" fill="#CCCCCC"/>
  <circle cx="115" cy="149" r="2" fill="#CCCCCC"/>
  
  <!-- Figma logo elements -->
  <!-- F shape in corner -->
  <path d="M 25 25 L 25 35 L 35 35 L 35 32 L 28 32 L 28 30 L 35 30 L 35 27 L 28 27 L 28 25 Z" fill="#18A0FB"/>
  
  <!-- Mobile icon -->
  <rect x="25" y="45" width="20" height="30" rx="3" fill="#18A0FB" opacity="0.8"/>
