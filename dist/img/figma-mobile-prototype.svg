<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="12" fill="#F6F6F6"/>
  
  <!-- Mobile phone frame -->
  <rect x="60" y="30" width="80" height="140" rx="12" fill="#333333"/>
  <rect x="65" y="35" width="70" height="130" rx="8" fill="white"/>
  
  <!-- Phone screen content -->
  <rect x="70" y="45" width="60" height="110" rx="4" fill="#F8F8F8"/>
  
  <!-- Status bar -->
  <rect x="70" y="45" width="60" height="16" rx="4" fill="#18A0FB"/>
