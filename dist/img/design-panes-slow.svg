<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .design-element {
        transform-origin: 45px 45px;
      }
      
      .floating-pane {
        animation: float 8s ease-in-out infinite;
      }
      
      .floating-pane:nth-child(2) {
        animation-delay: 2s;
      }
      
      .floating-pane:nth-child(3) {
        animation-delay: 4s;
      }
      
      @keyframes float {
        0%, 100% {
          transform: translateY(0px) rotate(0deg);
          opacity: 0.6;
        }
        50% {
          transform: translateY(-8px) rotate(2deg);
          opacity: 1;
        }
      }
      
      .rotating-element {
        animation: slowRotate 25s linear infinite;
      }
      
      @keyframes slowRotate {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      
      .breathing-element {
        animation: breathe 6s ease-in-out infinite;
      }
      
      @keyframes breathe {
        0%, 100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }
      
      .fade-element {
        animation: fade 10s ease-in-out infinite;
      }
      
      @keyframes fade {
        0%, 100% {
          opacity: 0.3;
        }
        50% {
          opacity: 0.8;
        }
      }
    </style>
  </defs>
  
  <!-- Background Grid (Subtle) -->
  <line x1="15" y1="75" x2="75" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="15" y1="60" x2="75" y2="60" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="15" y1="45" x2="75" y2="45" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="15" y1="30" x2="75" y2="30" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  
  <line x1="15" y1="30" x2="15" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="30" y1="30" x2="30" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="45" y1="30" x2="45" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="60" y1="30" x2="60" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  <line x1="75" y1="30" x2="75" y2="75" stroke="#e0e0e0" stroke-width="0.3" opacity="0.2"/>
  
  <!-- Floating Design Panes -->
  <g class="design-element">
    <!-- First Pane -->
    <rect x="20" y="35" width="25" height="20" rx="3" fill="#6366F1" opacity="0.8" class="floating-pane"/>
    <rect x="22" y="37" width="21" height="16" rx="2" fill="#818CF8" opacity="0.6"/>
    
    <!-- Second Pane -->
    <rect x="45" y="45" width="25" height="20" rx="3" fill="#10B981" opacity="0.8" class="floating-pane"/>
    <rect x="47" y="47" width="21" height="16" rx="2" fill="#34D399" opacity="0.6"/>
    
    <!-- Third Pane -->
    <rect x="35" y="55" width="25" height="20" rx="3" fill="#F59E0B" opacity="0.8" class="floating-pane"/>
    <rect x="37" y="57" width="21" height="16" rx="2" fill="#FBBF24" opacity="0.6"/>
  </g>
  
  <!-- Central Breathing Element -->
  <circle cx="45" cy="45" r="8" fill="#8B5CF6" opacity="0.7" class="breathing-element"/>
  
  <!-- Rotating Design Elements -->
  <g class="rotating-element">
    <circle cx="25" cy="25" r="3" fill="#EF4444" opacity="0.6"/>
    <circle cx="65" cy="25" r="3" fill="#06B6D4" opacity="0.6"/>
    <circle cx="65" cy="65" r="3" fill="#84CC16" opacity="0.6"/>
    <circle cx="25" cy="65" r="3" fill="#F97316" opacity="0.6"/>
  </g>
  
  <!-- Subtle Connection Lines -->
  <line x1="45" y1="45" x2="25" y2="25" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3" class="fade-element"/>
  <line x1="45" y1="45" x2="65" y2="25" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3" class="fade-element"/>
  <line x1="45" y1="45" x2="65" y2="65" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3" class="fade-element"/>
  <line x1="45" y1="45" x2="25" y2="65" stroke="#8B5CF6" stroke-width="0.5" opacity="0.3" class="fade-element"/>
</svg> 