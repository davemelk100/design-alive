<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main Design Pane -->
  <rect x="15" y="15" width="60" height="60" rx="6" fill="#6366F1" stroke="#4F46E5" stroke-width="2"/>
  
  <!-- Grid Lines -->
  <line x1="30" y1="15" x2="30" y2="75" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="15" x2="45" y2="75" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="15" x2="60" y2="75" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="15" y1="30" x2="75" y2="30" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="15" y1="45" x2="75" y2="45" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="15" y1="60" x2="75" y2="60" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  
  <!-- Design Elements -->
  <!-- Circle -->
  <circle cx="37.5" cy="37.5" r="8" fill="#F59E0B" opacity="0.8"/>
  
  <!-- Square -->
  <rect x="52" y="37" width="12" height="12" rx="2" fill="#10B981" opacity="0.8"/>
  
  <!-- Triangle -->
  <path d="M37.5 52 L45 60 L30 60 Z" fill="#EF4444" opacity="0.8"/>
  
  <!-- Design Tools -->
  <!-- Pencil -->
  <line x1="20" y1="25" x2="28" y2="17" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="28" y1="17" x2="30" y2="15" stroke="#FFFFFF" stroke-width="1"/>
  
  <!-- Color Palette -->
  <circle cx="70" cy="20" r="4" fill="#F59E0B"/>
  <circle cx="75" cy="20" r="4" fill="#10B981"/>
  <circle cx="80" cy="20" r="4" fill="#EF4444"/>
  <circle cx="72.5" cy="25" r="4" fill="#6366F1"/>
</svg> 