<svg width="90" height="90" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .main-group {
        transform-origin: 45px 45px;
        animation: rotate 8s linear infinite;
      }
      
      .cube-face {
        fill-opacity: 0.9;
        stroke: #1a1a1a;
        stroke-width: 0.5;
      }
      
      .primary-face {
        fill: #ff6b6b;
      }
      
      .secondary-face {
        fill: #4ecdc4;
      }
      
      .tertiary-face {
        fill: #45b7d1;
      }
      
      .accent-face {
        fill: #96ceb4;
      }
      
      @keyframes rotate {
        0% {
          transform: rotateX(35deg) rotateY(0deg) rotateZ(0deg);
        }
        100% {
          transform: rotateX(35deg) rotateY(360deg) rotateZ(0deg);
        }
      }
      
      .floating-element {
        animation: float 3s ease-in-out infinite alternate;
      }
      
      @keyframes float {
        0% {
          transform: translateY(0px);
        }
        100% {
          transform: translateY(-3px);
        }
      }
      
      .pulse-element {
        animation: pulse 2s ease-in-out infinite alternate;
      }
      
      @keyframes pulse {
        0% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
      
      .grid-line {
        stroke: #e0e0e0;
        stroke-width: 0.3;
        opacity: 0.4;
      }
      
      .projection-line {
        stroke: #ff6b6b;
        stroke-width: 0.8;
        stroke-dasharray: 2,2;
        animation: dash 1.5s linear infinite;
      }
      
      @keyframes dash {
        to {
          stroke-dashoffset: -4;
        }
      }
    </style>
  </defs>
  
  <!-- Background Grid -->
  <line x1="10" y1="80" x2="80" y2="80" class="grid-line"/>
  <line x1="10" y1="65" x2="80" y2="65" class="grid-line"/>
  <line x1="10" y1="50" x2="80" y2="50" class="grid-line"/>
  <line x1="10" y1="35" x2="80" y2="35" class="grid-line"/>
  <line x1="10" y1="20" x2="80" y2="20" class="grid-line"/>
  
  <line x1="10" y1="20" x2="10" y2="80" class="grid-line"/>
  <line x1="25" y1="20" x2="25" y2="80" class="grid-line"/>
  <line x1="40" y1="20" x2="40" y2="80" class="grid-line"/>
  <line x1="55" y1="20" x2="55" y2="80" class="grid-line"/>
  <line x1="70" y1="20" x2="70" y2="80" class="grid-line"/>
  
  <!-- Main Geometric Structure -->
  <g class="main-group">
    <!-- Base Cube -->
    <polygon points="25,70 45,60 45,80 25,90" class="cube-face primary-face"/>
    <polygon points="25,70 45,60 65,70 45,80" class="cube-face secondary-face"/>
    <polygon points="45,60 65,70 65,90 45,80" class="cube-face tertiary-face"/>
    
    <!-- Elevated Cube -->
    <polygon points="35,50 55,40 55,60 35,70" class="cube-face accent-face"/>
    <polygon points="35,50 55,40 75,50 55,60" class="cube-face primary-face"/>
    <polygon points="55,40 75,50 75,70 55,60" class="cube-face secondary-face"/>
    
    <!-- Connecting Elements -->
    <polygon points="25,70 35,50 35,70 25,90" class="cube-face tertiary-face"/>
    <polygon points="45,60 55,40 55,60 45,80" class="cube-face accent-face"/>
    <polygon points="65,70 75,50 75,70 65,90" class="cube-face primary-face"/>
    
    <!-- Top Platform -->
    <polygon points="30,40 50,30 70,40 50,50" class="cube-face secondary-face"/>
    
    <!-- Floating Elements -->
    <g class="floating-element">
      <polygon points="40,30 50,25 50,35 40,40" class="cube-face accent-face"/>
      <polygon points="50,25 60,30 60,40 50,35" class="cube-face tertiary-face"/>
    </g>
    
    <!-- Cube Edges -->
    <line x1="25" y1="70" x2="45" y2="60" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="45" y1="60" x2="65" y2="70" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="65" y1="70" x2="65" y2="90" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="65" y1="90" x2="45" y2="80" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="45" y1="80" x2="25" y2="90" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="25" y1="90" x2="25" y2="70" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <line x1="35" y1="50" x2="55" y2="40" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="55" y1="40" x2="75" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="75" y1="50" x2="75" y2="70" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="75" y1="70" x2="55" y2="60" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="55" y1="60" x2="35" y2="70" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="35" y1="70" x2="35" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
    
    <line x1="30" y1="40" x2="50" y2="30" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="50" y1="30" x2="70" y2="40" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="70" y1="40" x2="70" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="70" y1="50" x2="50" y2="60" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="50" y1="60" x2="30" y2="50" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="30" y1="50" x2="30" y2="40" stroke="#1a1a1a" stroke-width="0.5"/>
  </g>
  

  

</svg> 